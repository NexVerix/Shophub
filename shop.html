<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopHub - Shop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:url('img/bg_free.avif');background-size:cover;}
header{background:#333;color:#fff;padding:1rem 2rem;display:flex;justify-content:space-between;}
nav a{color:#fff;margin-left:1rem;text-decoration:none;position:relative;}
nav a::after{content:"";position:absolute;bottom:-5px;left:0;width:0;height:2px;background:#28a745;transition:.3s;}
nav a:hover::after{width:100%;}
.container{padding:2rem;max-width:1200px;margin:auto;}
.products{display:flex;flex-wrap:wrap;gap:20px;}
.product{background:#fff;padding:1rem;border-radius:8px;width:calc(33% - 20px);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.product img{width:100%;height:200px;object-fit:cover;}
button{background:#28a745;color:#fff;border:none;padding:10px;border-radius:5px;margin-top:10px;}
button:hover{background:#218838;}
@media(max-width:768px){.product{width:100%;}}
footer{background:#222;color:#fff;padding:2rem;text-align:center;margin-top:2rem;}
</style>
</head>
<body>

<header>
<h1>ShopHub</h1>
<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">Cart</a>
<a href="account.html">Account</a>
<a href="setting.html">Setting</a>
<a href="service.html">Service</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<div class="container">
<h2>Shop All Products</h2>
<div class="products" id="shopProducts"></div>
</div>

<footer>
<p>&copy; 2025 ShopHub. All rights reserved.</p>
</footer>

<script>
const products = JSON.parse(localStorage.getItem("products")) || [];
const container = document.getElementById("shopProducts");

products.forEach(p=>{
container.innerHTML+=`
<div class="product">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button>Add to Cart</button>
</div>`;
});
</script>

</body>
</html>
