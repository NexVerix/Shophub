<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopHub - Contact</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:url('img/bg_free.avif');background-size:cover;}
header{background:#333;color:#fff;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
nav a{color:#fff;margin-left:1rem;text-decoration:none;position:relative;}
nav a::after{content:"";position:absolute;bottom:-5px;left:0;width:0;height:2px;background:#28a745;transition:.3s;}
nav a:hover::after{width:100%;}
.container{max-width:600px;margin:2rem auto;background:#fff;padding:2rem;border-radius:8px;}
input,textarea{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:5px;}
button{background:#28a745;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;}
button:hover{background:#218838;}
footer{background:#222;color:#fff;padding:2rem;text-align:center;margin-top:2rem;}
</style>
</head>
<body>

<header>
<h1>ShopHub</h1>
<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">Cart</a>
<a href="account.html">Account</a>
<a href="setting.html">Setting</a>
<a href="service.html">Service</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<div class="container">
<h2>Contact Us</h2>
<form>
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea rows="5" placeholder="Your Message" required></textarea>
<button type="submit">Send Message</button>
</form>
</div>

<footer>
<p>&copy; 2025 ShopHub. All rights reserved.</p>
</footer>

</body>
</html>
